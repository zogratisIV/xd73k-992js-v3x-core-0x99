name: Ghost V3 Base Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Pacman & Add Artix Repos Directly
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        
        # تثبيت الأدوات الأساسية للبناء
        pacman -Sy --noconfirm wget git base-devel sudo

        # حقن مستودعات آرتكس مع السيرفرات مباشرة بدون الاعتماد على ملف فرعي
        # هنستخدم ميرور عالمي مستقر جداً ومباشر
        echo -e "\n[system]\nServer = https://mirror.clarkson.edu/artixlinux/\$repo/os/\$arch" | tee -a /etc/pacman.conf
        echo -e "\n[world]\nServer = https://mirror.clarkson.edu/artixlinux/\$repo/os/\$arch" | tee -a /etc/pacman.conf
        
        # تحديث كامل وقوي بقاعدة البيانات الجديدة
        pacman -Sy --noconfirm

    - name: Inject V3 Flags & Setup Builder User
      run: |
        # تفعيل الـ v3 والـ O3 في الـ Compiler للـ Container
        sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /etc/makepkg.conf
        
        # عمل مستخدم الـ builder وضبط الصلاحيات
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" | tee -a /etc/sudoers
        
        mkdir -p /workspace/packages
        chown -R builder:builder /workspace

    - name: Compile Target Base Packages
      run: |
        # هنا هيبدأ الكومبايل الـ Native الفعلي بصلاحيات الـ builder والـ v3 شغال
        sudo -u builder -i bash -c "
          cd /workspace
          git clone https://gitea.artixlinux.org/packages/artix-keyring.git
          cd artix-keyring
          makepkg -sc --noconfirm
          cp *.pkg.tar.zst /workspace/packages/ 2>/dev/null || true
        "

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /workspace/packages/name: Ghost V3 Base Builder

