name: Ghost V3 Base Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Bypass Broken Container Hooks & Setup Config
      run: |
        # حل مشكلة الـ tmpfiles عشان الـ hooks متموتش الـ job في التحديث
        mkdir -p /etc/tmpfiles.d
        echo "d /run/initramfs 0755 root root -" > /etc/tmpfiles.d/fix.conf
        ln -sf /dev/null /usr/lib/tmpfiles.d/journal-nocow.conf

        pacman-key --init
        pacman-key --populate archlinux

        # إنشاء المجلدات وسحب الميرور باستخدام curl المتاح في الحاوية
        mkdir -p /etc/pacman.d
        curl -sL "https://gitea.artixlinux.org/packages/artix-mirrorlist/raw/branch/master/mirrorlist" -o /etc/pacman.d/artix-mirrorlist

        # كتابة الـ Config النضيف
        cat << 'EOF' > /etc/pacman.conf
        [options]
        HoldPkg     = pacman glibc
        Architecture = auto
        Color
        CheckSpace
        ParallelDownloads = 5
        SigLevel    = Required DatabaseOptional
        LocalFileSigLevel = Optional

        [core]
        Include = /etc/pacman.d/mirrorlist

        [extra]
        Include = /etc/pacman.d/mirrorlist

        [system]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist

        [world]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist

        [galaxy]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist
        EOF

    - name: Install Base Requirements
      run: |
        # تحديث وتثبيت الأدوات الأساسية مع تجاهل الـ hook الخربان لو رمى كود خطأ
        pacman -Sy --noconfirm git base-devel sudo || true
        pacman -Syy --noconfirm

    - name: Inject V3 Flags & Setup Builder User
      run: |
        # حقن حزم الـ v3 والـ O3 للكومبايلر
        sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /etc/makepkg.conf
        
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" | tee -a /etc/sudoers
        
        mkdir -p /workspace/packages
        chown -R builder:builder /workspace

    - name: Compile Target Base Packages
      run: |
        sudo -u builder -i bash -c "
          cd /workspace
          git clone https://gitea.artixlinux.org/packages/artix-keyring.git
          cd artix-keyring
          makepkg -sc --noconfirm
          cp *.pkg.tar.zst /workspace/packages/ 2>/dev/null || true
        "

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /workspace/packages/
