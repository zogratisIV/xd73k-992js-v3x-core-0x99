name: Ghost V3 Base Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dedicated Artix Environment
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        
        # تثبيت الأدوات الأساسية أولاً
        pacman -Sy --noconfirm wget git base-devel sudo

        # إنشاء مجلد المستودعات
        mkdir -p /etc/pacman.d

        # سحب الميرور ليست الرسمية
        wget -qO /etc/pacman.d/artix-mirrorlist "https://gitea.artixlinux.org/packages/artix-mirrorlist/raw/branch/master/mirrorlist"

        # كتابة ملف pacman.conf جديد بالكامل لتجنب أخطاء الـ sed والـ 404
        cat << 'EOF' > /etc/pacman.conf
        [options]
        HoldPkg     = pacman glibc
        Architecture = auto
        Color
        CheckSpace
        ParallelDownloads = 5
        SigLevel    = Required DatabaseOptional
        LocalFileSigLevel = Optional

        [core]
        Include = /etc/pacman.d/mirrorlist

        [extra]
        Include = /etc/pacman.d/mirrorlist

        [system]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist

        [world]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist

        [galaxy]
        SigLevel = Never
        Include = /etc/pacman.d/artix-mirrorlist
        EOF

        # التحديث النهائي الشامل (هينزل طلقة دلوقتي)
        pacman -Syy --noconfirm

    - name: Inject V3 Flags & Setup Builder User
      run: |
        # تفعيل الـ v3 والـ O3 في الـ Compiler للـ Container
        sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /etc/makepkg.conf
        
        # إعداد مستخدم الـ builder
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" | tee -a /etc/sudoers
        
        mkdir -p /workspace/packages
        chown -R builder:builder /workspace

    - name: Compile Target Base Packages
      run: |
        # الكومبايل الـ Native بصلاحيات الـ builder والـ v3 شغال
        sudo -u builder -i bash -c "
          cd /workspace
          git clone https://gitea.artixlinux.org/packages/artix-keyring.git
          cd artix-keyring
          makepkg -sc --noconfirm
          cp *.pkg.tar.zst /workspace/packages/ 2>/dev/null || true
        "

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /workspace/packages/
