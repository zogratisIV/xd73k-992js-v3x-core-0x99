name: Ghost V3 Base Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Pacman & Add Artix Repos via Official Mirrorlist
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        
        # تثبيت الأدوات الأساسية
        pacman -Sy --noconfirm wget git base-devel sudo

        # تجهيز مسار الـ mirrorlist الخاص بآرتكس
        mkdir -p /etc/pacman.d

        # سحب الـ mirrorlist الرسمية من مستودع أداوت آرتكس مباشرة لضمان سيرفرات شغالة 100%
        wget -qO /etc/pacman.d/artix-mirrorlist "https://gitea.artixlinux.org/packages/artix-mirrorlist/raw/branch/master/mirrorlist"

        # حقن المستودعات الأساسية في pacman.conf والإشارة للملف الفرعي اللي نزلناه
        echo -e "\n[system]\nInclude = /etc/pacman.d/artix-mirrorlist" | tee -a /etc/pacman.conf
        echo -e "\n[world]\nInclude = /etc/pacman.d/artix-mirrorlist" | tee -a /etc/pacman.conf
        echo -e "\n[galaxy]\nInclude = /etc/pacman.d/artix-mirrorlist" | tee -a /etc/pacman.conf

        # إجبار باكمان على تخطي فحص التوقيعات مؤقتاً لحزم آرتكس حتى نثبت الـ keyring الخاص بآرتكس
        sed -i '/\[system\]/,/Include/s/Include.*/Include = \/etc\/pacman.d\/artix-mirrorlist\nSigLevel = Never/' /etc/pacman.conf
        sed -i '/\[world\]/,/Include/s/Include.*/Include = \/etc\/pacman.d\/artix-mirrorlist\nSigLevel = Never/' /etc/pacman.conf
        sed -i '/\[galaxy\]/,/Include/s/Include.*/Include = \/etc\/pacman.d\/artix-mirrorlist\nSigLevel = Never/' /etc/pacman.conf

        # الآن التحديث هيشتغل طلقة لأن باكمان هيجرب السيرفرات الرسمية واحد ورا التاني تلقائياً
        pacman -Syy --noconfirm

    - name: Inject V3 Flags & Setup Builder User
      run: |
        # تفعيل الـ v3 والـ O3 العنيف في الـ Compiler للـ Container
        sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /etc/makepkg.conf
        
        # إعداد مستخدم الـ builder
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" | tee -a /etc/sudoers
        
        mkdir -p /workspace/packages
        chown -R builder:builder /workspace

    - name: Compile Target Base Packages
      run: |
        # الكومبايل الـ Native بصلاحيات الـ builder والـ v3 شغال
        sudo -u builder -i bash -c "
          cd /workspace
          git clone https://gitea.artixlinux.org/packages/artix-keyring.git
          cd artix-keyring
          makepkg -sc --noconfirm
          cp *.pkg.tar.zst /workspace/packages/ 2>/dev/null || true
        "

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /workspace/packages/
