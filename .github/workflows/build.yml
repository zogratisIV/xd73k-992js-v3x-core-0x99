on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest
    # تشغيل الـ Job بالكامل جوه حاوية آرش رسمية عشان أدوات باكمان تكون Native 100%
    container:
      image: archlinux:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Pacman & Add Artix Repos
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        pacman -Sy --noconfirm wget git base-devel

        # إضافة مستودعات آرتكس للسيستم عشان نسحب منها الحزم الرسمية ونحولها v3
        echo -e "\n[system]\nInclude = /etc/pacman.d/artix-mirrorlist" | suits=1 tee -a /etc/pacman.conf
        echo -e "[world]\nInclude = /etc/pacman.d/artix-mirrorlist" | tee -a /etc/pacman.conf
        
        # تجهيز الـ Mirrorlist الخاصة بآرتكس
        mkdir -p /etc/pacman.d
        wget -qO- https://gitea.artixlinux.org/packages/artix-mirrorlist/raw/branch/master/mirrorlist | tee /etc/pacman.d/artix-mirrorlist
        
        # تحديث الحزم بالمستودعات الجديدة
        pacman -Sy --noconfirm

    - name: Inject V3 Flags & Build
      run: |
        # تفعيل الـ v3 والـ O3 العنيف في ملف الماك بي كيج الرئيسي للـ Container
        sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /etc/makepkg.conf
        
        # عمل مجلد لتجميع الحزم الجاهزة
        mkdir -p /workspace/packages
        
        # كمثال تجريبي: سحب الـ PKGBUILD بتاع أداة أساسية عشان نكمبلها v3
        # هنا تقدر تحط الـ سكريبتات بتاعتك لبناء الـ Base
        echo "البيئة جاهزة فُل v3 والـ Native pacman شغال"

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /workspace/packages/
