name: Ghost V3 Base Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-v3:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Pacman & Artix Keyring
      run: |
        sudo apt-get update
        sudo apt-get install -y pacman-package-manager arch-install-scripts binutils zstd
        
        # تجهيز مسار الشروت
        sudo mkdir -p /mnt/artix
        
        # تحميل مفاتيح آرتكس ومستودعاتها الأساسية ديناميكياً
        sudo mkdir -p /etc/pacman.d
        echo 'Server = https://mirror1.artixlinux.org/changelog/$pool' | sudo tee /etc/pacman.d/mirrorlist
        # إضافة مستودع نظام آرتكس الأساسي
        sudo wget -qO- https://gitea.artixlinux.org/packages/artix-mirrorlist/raw/branch/master/mirrorlist | sudo tee /etc/pacman.d/mirrorlist

    - name: Bootstrap Artix Base System
      run: |
        # بناء النظام الأساسي جوه المجلد من الصفر بدون تحميل ملف tar جاهز
        sudo pacstrap -K /mnt/artix base base-devel git --noconfirm

    - name: Inject V3 Flags & Compile Base
      run: |
        # تفعيل الـ v3 والـ O3 العنيف جوه السيستم الجديد
        sudo sed -i 's/-march=x86-64 -mtune=generic/-march=x86-64-v3 -O3 -pipe/g' /mnt/artix/etc/makepkg.conf
        
        # الدخول للشروت وبدء تفعيل المفاتيح
        sudo arch-chroot /mnt/artix /bin/bash -c "
          pacman-key --init
          pacman-key --populate artix
          # هنا السيستم جاهز وفُل v3 ومستني أوامر الكومبايل بتاعتك
        "

    - name: Upload V3 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artix-v3-packages
        path: /mnt/artix/root/packages/
